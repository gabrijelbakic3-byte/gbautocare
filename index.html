<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBAutoCare</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0a0a0a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* POZADINA STRELICA */

.arrows{
position:fixed;
top:0;
left:0;
width:200%;
height:100%;
display:flex;
align-items:center;
font-size:140px;
color:#ff2a2a;
opacity:0.07;
filter:blur(4px);
white-space:nowrap;
animation:moveArrows 12s linear infinite;
z-index:0;
}

@keyframes moveArrows{
0%{
transform:translateX(-50%);
}
100%{
transform:translateX(0%);
}
}

/* CONTAINER */

.container{
max-width:600px;
position:relative;
z-index:2;
padding:20px;
}

/* LOGO */

.logo{
width:120px;
margin-bottom:15px;
}

/* NASLOV */

h1{
color:#ff2a2a;
font-size:48px;
margin-bottom:10px;
}

h2{
margin-top:0;
}

p{
opacity:0.8;
line-height:1.6;
}

/* WHATSAPP */

.whatsapp{
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#ff2a2a;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.whatsapp:hover{
background:#ff4444;
}

/* MOBILE */

@media (max-width:768px){

.arrows{
font-size:80px;
filter:blur(3px);
}

.logo{
width:90px;
}

h1{
font-size:34px;
}

h2{
font-size:20px;
}

p{
font-size:14px;
}

.whatsapp{
padding:12px 22px;
font-size:14px;
}

}

</style>
</head>

<body>

<div class="arrows">
→ → → → → → → → → → → → → → → → → → → → → → → → → → → → → → →
</div>

<div class="container">

<img src="logo-white.png" class="logo">

<h1>GBAutoCare</h1>

<h2>Stranica je trenutno u izradi</h2>

<p>
Radimo na novoj web stranici.  
Za rezervaciju termina kontaktirajte nas.
</p>

<a class="whatsapp" href="https://wa.me/385996471243">
Pošalji WhatsApp
</a>

</div>

</body>
</html>
