<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prijava</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

  <div class="auth-shell">
    <a class="auth-top-link" href="index main.html">← Natrag na početnu</a>

    <div class="auth-card">
      <div class="auth-logo">GBAutoCare</div>
      <h1 class="auth-title">Prijava</h1>
      <p class="auth-subtitle">
        Prijavi se i automatski popuni rezervacijsku formu svojim podacima.
      </p>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email adresa" required>
        <input type="password" id="login-password" placeholder="Lozinka" required>
        <button type="submit" class="auth-btn">Prijavi se</button>
      </form>

      <p id="login-message" class="auth-message"></p>

      <div class="auth-links">
        Nemaš račun? <a href="register.html">Registriraj se</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
